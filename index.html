<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>🎬 Filmáček</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d0d1a;font-family:system-ui,-apple-system,sans-serif;color:#fff;min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pop{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideR{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flip{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}
@keyframes flipBack{0%{transform:rotateY(180deg)}100%{transform:rotateY(0)}}

/* ══════════════════════════════════════
HOME
══════════════════════════════════════ */
#home{
background:radial-gradient(ellipse at 50% -10%,#22104a 0%,#0d0d1a 65%);
align-items:center;padding:0 24px;
}
.home-glow{position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:320px;height:320px;
background:radial-gradient(circle,rgba(140,80,255,.18),transparent 70%);pointer-events:none;}
.home-emoji{font-size:70px;animation:float 3s ease-in-out infinite;
filter:drop-shadow(0 0 30px rgba(160,100,255,.55));margin-bottom:14px;text-align:center;}
.home-pretitle{font-size:10px;letter-spacing:7px;color:rgba(255,255,255,.28);text-align:center;margin-bottom:5px;}
.home-title{font-size:40px;font-weight:900;text-align:center;
background:linear-gradient(140deg,#fff 40%,rgba(190,150,255,.75));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-sub{font-size:13px;color:rgba(255,255,255,.35);text-align:center;margin-top:8px;margin-bottom:38px;}
.home-cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px;}
.hcard{border-radius:26px;cursor:pointer;transition:transform .2s,box-shadow .2s;
overflow:hidden;position:relative;animation:slideUp .5s ease both;}
.hcard:active{transform:scale(.97);}
.hcard-body{padding:26px 24px;display:flex;align-items:center;gap:20px;}
.hcard-icon{font-size:42px;flex-shrink:0;}
.hcard-text{flex:1;}
.hcard-name{font-size:22px;font-weight:900;margin-bottom:4px;}
.hcard-desc{font-size:12px;opacity:.58;line-height:1.45;}
.hcard-arrow{font-size:22px;opacity:.45;flex-shrink:0;}
.home-footer{margin-top:auto;padding:22px 0;font-size:10px;color:rgba(255,255,255,.12);
letter-spacing:2px;text-align:center;}

/* ══════════════════════════════════════
VÝBĚR OBTÍŽNOSTI
══════════════════════════════════════ */
#vybrat-obtiz{background:linear-gradient(160deg,#0d0d1a,#12101e);padding:0 22px;}
.page-header{padding:52px 0 26px;display:flex;align-items:center;gap:14px;}
.back-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.08);
border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;
display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.page-title{font-size:22px;font-weight:800;}
.page-sub{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:22px;}
.diff-btn{display:flex;align-items:center;gap:16px;padding:20px 20px;
border-radius:22px;border:1.5px solid;cursor:pointer;margin-bottom:13px;
transition:transform .2s,box-shadow .2s;animation:slideUp .5s ease both;}
.diff-btn:active{transform:scale(.97);}
.diff-icon{width:58px;height:58px;border-radius:16px;
display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.diff-info{flex:1;}
.diff-name{font-size:20px;font-weight:800;margin-bottom:3px;}
.diff-sub{font-size:12px;color:rgba(255,255,255,.4);}
.diff-hs{text-align:right;flex-shrink:0;}
.diff-hs-l{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.diff-hs-v{font-size:18px;font-weight:800;}

/* ══════════════════════════════════════
TOPBAR (KVÍZ)
══════════════════════════════════════ */
.topbar{display:flex;align-items:center;padding:50px 22px 14px;gap:12px;}
.progress-bar{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s;}
.score-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0;}

/* ══════════════════════════════════════
KVÍZ TEXTOVÝ
══════════════════════════════════════ */
#kviz-text{background:linear-gradient(160deg,#0d0d1a,#12101e);}
.kviz-body{flex:1;padding:0 22px 28px;overflow-y:auto;animation:slideR .35s ease;}
.poster-box{position:relative;margin-bottom:14px;border-radius:16px;overflow:hidden;
height:174px;background:rgba(255,255,255,.05);
display:flex;align-items:center;justify-content:center;}
.poster-box img{width:100%;height:100%;object-fit:cover;}
.poster-loading{font-size:30px;animation:pulse 1s infinite;}
.trailer-napoveda{display:flex;align-items:center;gap:8px;padding:10px 16px;
border-radius:14px;background:rgba(255,255,255,.07);
border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);
font-size:13px;cursor:pointer;margin-bottom:12px;width:100%;}
.trailer-napoveda:active{transform:scale(.98);}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;
border-radius:20px;font-size:12px;font-weight:600;margin-bottom:10px;}
.q-text{font-size:15px;color:rgba(255,255,255,.88);line-height:1.65;margin-bottom:10px;}
.q-meta{display:flex;gap:8px;margin-bottom:18px;align-items:center;}
.q-tag{font-size:10px;font-weight:700;color:#FF9F0A;padding:2px 8px;border-radius:6px;background:rgba(255,159,10,.15);}
.q-rok{font-size:11px;color:rgba(255,255,255,.3);}
.opt{display:flex;align-items:center;gap:12px;padding:13px 14px;
border-radius:14px;border:1.5px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.06);cursor:pointer;width:100%;text-align:left;
margin-bottom:9px;transition:all .25s;}
.opt:active{transform:scale(.98);}
.opt.ok{background:rgba(52,199,89,.2);border-color:rgba(52,199,89,.7);}
.opt.err{background:rgba(255,59,48,.2);border-color:rgba(255,59,48,.7);}
.opt.dim{opacity:.28;}
.opt-letter{width:27px;height:27px;border-radius:50%;
display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.opt-text{font-size:14px;font-weight:500;flex:1;}

/* ══════════════════════════════════════
KVÍZ OBRÁZKOVÝ
══════════════════════════════════════ */
#kviz-obr{background:linear-gradient(160deg,#0d0d1a,#12101e);}
.obr-question{padding:10px 22px 12px;text-align:center;
background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);}
.obr-q-title{font-size:15px;font-weight:700;}
.obr-q-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;}
.obr-stars{text-align:center;padding:8px 22px;font-size:20px;}
.obr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 24px;}
.obr-tile{border-radius:14px;overflow:hidden;cursor:pointer;
border:2.5px solid rgba(255,255,255,.08);transition:all .3s;
aspect-ratio:2/3;background:#1a1a2e;position:relative;
display:flex;align-items:center;justify-content:center;}
.obr-tile img{width:100%;height:100%;object-fit:cover;}
.obr-tile.ok{border-color:#34C759;}
.obr-tile.err{border-color:#FF3B30;}
.obr-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;}
.obr-overlay.ok{background:rgba(52,199,89,.32);}
.obr-overlay.err{background:rgba(255,59,48,.32);}

/* ══════════════════════════════════════
HRY – VÝBĚR
══════════════════════════════════════ */
#vybrat-hry{background:linear-gradient(160deg,#0d0d1a,#15102a);padding:0 22px;}
.hry-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-bottom:32px;}
.hra-card{padding:22px 14px 18px;border-radius:20px;
background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);
cursor:pointer;text-align:center;transition:transform .2s,box-shadow .2s;
animation:slideUp .4s ease both;}
.hra-card:active{transform:scale(.95);}
.hra-card-emoji{font-size:36px;margin-bottom:10px;}
.hra-card-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.hra-card-desc{font-size:11px;color:rgba(255,255,255,.33);line-height:1.4;}
.hra-card-hs{font-size:10px;margin-top:8px;font-weight:600;}

/* ══════════════════════════════════════
MINIHRA INFO
══════════════════════════════════════ */
#hra-info{background:linear-gradient(160deg,#0d0d1a,#15102a);
align-items:center;justify-content:center;padding:40px 28px;text-align:center;}
.info-emoji{font-size:72px;animation:pop .5s ease;margin-bottom:18px;}
.info-title{font-size:26px;font-weight:900;margin-bottom:10px;}
.info-desc{font-size:15px;color:rgba(255,255,255,.5);line-height:1.65;margin-bottom:20px;}
.info-rules{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
border-radius:18px;padding:18px 20px;margin-bottom:28px;text-align:left;width:100%;max-width:360px;}
.info-rule{display:flex;align-items:flex-start;gap:10px;
font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;line-height:1.45;}
.info-rule:last-child{margin-bottom:0;}
.info-rule-i{font-size:16px;flex-shrink:0;}
.btn-primary{padding:16px;border-radius:18px;border:none;
font-size:17px;font-weight:800;color:#000;cursor:pointer;width:100%;max-width:360px;margin-bottom:12px;}
.btn-ghost{padding:14px;border-radius:16px;background:rgba(255,255,255,.06);
border:none;font-size:14px;color:rgba(255,255,255,.4);cursor:pointer;width:100%;max-width:360px;}

/* ══════════════════════════════════════
MINIHRA WRAPPER
══════════════════════════════════════ */
#minihra{background:linear-gradient(160deg,#0d0d1a,#15102a);}
.mini-topbar{display:flex;align-items:center;justify-content:space-between;padding:50px 22px 18px;}
.mini-topbar-l{display:flex;flex-direction:column;}
.mini-topbar-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.3);font-weight:600;}
.mini-topbar-name{font-size:20px;font-weight:800;color:#FFD60A;}
.mini-exit{padding:8px 14px;border-radius:20px;background:rgba(255,255,255,.07);
border:none;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;}
.mini-body{flex:1;padding:0 22px 28px;
display:flex;flex-direction:column;align-items:center;gap:14px;overflow-y:auto;}
.mini-poster{width:180px;height:252px;border-radius:16px;overflow:hidden;
background:#1a1a2e;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mini-poster img{width:100%;height:100%;object-fit:cover;}
.mini-lbl{font-size:13px;color:rgba(255,255,255,.5);text-align:center;}
.mini-hint{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-top:2px;}
.mini-opt{padding:13px 16px;border-radius:14px;
background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);
color:#fff;font-size:14px;font-weight:600;cursor:pointer;
width:100%;text-align:left;margin-bottom:8px;transition:all .2s;}
.mini-opt:active{transform:scale(.97);}
.mini-result{text-align:center;animation:pop .4s ease;width:100%;padding:6px 0;}
.res-emoji{font-size:52px;margin-bottom:12px;}
.res-title{font-size:20px;font-weight:800;margin-bottom:6px;}
.res-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:20px;}
.res-next{padding:14px 40px;border-radius:16px;background:#FFD60A;
border:none;font-size:16px;font-weight:700;color:#000;cursor:pointer;}

/* ══════════════════════════════════════
PEXESO
══════════════════════════════════════ */
.pex-stats{display:flex;gap:20px;justify-content:center;
font-size:13px;color:rgba(255,255,255,.5);margin-bottom:4px;}
.pex-stat-v{font-weight:700;color:#fff;}
.pex-grid{display:grid;gap:8px;width:100%;}
.pex-karta{border-radius:12px;overflow:hidden;cursor:pointer;
aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a2e,#16213e);
border:2px solid rgba(255,255,255,.1);transition:transform .15s;
position:relative;display:flex;align-items:center;justify-content:center;font-size:28px;}
.pex-karta:active{transform:scale(.95);}
.pex-karta.odkryta{border-color:rgba(255,255,255,.3);}
.pex-karta.sparovana{border-color:#34C759;opacity:.65;}
.pex-karta img{width:100%;height:100%;object-fit:cover;}

/* ══════════════════════════════════════
OMALOVÁNKY
══════════════════════════════════════ */
.omal-canvas-wrap{width:100%;border-radius:16px;overflow:hidden;position:relative;}
canvas{display:block;width:100%;touch-action:none;}
.omal-barvy{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.omal-barva{width:38px;height:38px;border-radius:50%;cursor:pointer;
border:3px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;}
.omal-barva.on{border-color:#fff;transform:scale(1.2);}
.omal-btns{display:flex;gap:10px;width:100%;}
.omal-btn{flex:1;padding:12px;border-radius:14px;border:none;
font-size:13px;font-weight:700;cursor:pointer;}

/* ══════════════════════════════════════
PUZZLE
══════════════════════════════════════ */
.puzzle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;
background:#111;border-radius:12px;overflow:hidden;width:270px;height:360px;flex-shrink:0;}
.puzzle-d{overflow:hidden;cursor:pointer;border:2px solid transparent;
transition:border .15s;border-radius:4px;}
.puzzle-d.sel{border:2px solid #FFD60A;}
.puzzle-moves{font-size:12px;color:rgba(255,255,255,.35);text-align:center;}

/* ══════════════════════════════════════
VÝSLEDKY KVÍZU
══════════════════════════════════════ */
#vysledky{background:linear-gradient(160deg,#0d0d1a,#12101e);
align-items:center;justify-content:center;padding:40px 22px;}
.vysl-wrap{width:100%;max-width:440px;}
.vysl-emoji{font-size:72px;text-align:center;margin-bottom:14px;
animation:pop .6s cubic-bezier(.34,1.56,.64,1);}
.vysl-title{font-size:26px;font-weight:900;text-align:center;margin-bottom:6px;}
.vysl-sub{font-size:14px;color:rgba(255,255,255,.4);text-align:center;}
.vysl-new{margin-top:10px;font-size:13px;color:#FFD60A;font-weight:700;
text-align:center;animation:pulse 1s infinite;}
.stats-row{display:flex;width:100%;border-radius:20px;
background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
overflow:hidden;margin:26px 0 12px;}
.stat-col{flex:1;padding:16px 8px;text-align:center;
border-right:1px solid rgba(255,255,255,.07);}
.stat-col:last-child{border-right:none;}
.stat-v{font-size:20px;font-weight:900;margin-bottom:3px;}
.stat-l{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.rekord-row{width:100%;border-radius:14px;
background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
padding:14px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.rekord-l{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;margin-bottom:2px;}
.rekord-v{font-size:16px;font-weight:700;}

/* ══════════════════════════════════════
TRAILER MODAL
══════════════════════════════════════ */
#trailer-modal{display:none;position:fixed;inset:0;
background:rgba(0,0,0,.92);z-index:999;
align-items:center;justify-content:center;padding:20px;}
#trailer-modal.on{display:flex;}
.trailer-box{width:100%;max-width:560px;border-radius:20px;overflow:hidden;background:#000;}
.trailer-ratio{position:relative;padding-bottom:56.25%;}
.trailer-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.trailer-close{width:100%;padding:14px;background:rgba(255,255,255,.07);
border:none;color:rgba(255,255,255,.45);font-size:14px;cursor:pointer;}
</style>

</head>
<body>

<!-- ══ HOME ══ -->

<div id="home" class="screen active">
  <div class="home-glow"></div>
  <div style="padding-top:70px;width:100%;max-width:420px">
    <div class="home-emoji">🎬</div>
    <div class="home-title">Filmáček</div>
    <div class="home-sub">Kvízy a hry o filmech</div>
  </div>
  <div class="home-cards">
    <div class="hcard" style="background:linear-gradient(135deg,#1a2a4a,#0f1a30);animation-delay:.1s" onclick="showScreen('vybrat-obtiz')">
      <div class="hcard-body">
        <div class="hcard-icon">🎬</div>
        <div class="hcard-text">
          <div class="hcard-name">Kvíz</div>
          <div class="hcard-desc">Otázky o filmech · 3 obtížnosti · Lehká, Střední, Těžká</div>
        </div>
        <div class="hcard-arrow">›</div>
      </div>
    </div>
    <div class="hcard" style="background:linear-gradient(135deg,#2a1a4a,#1a0f35);animation-delay:.2s" onclick="showScreen('vybrat-hry')">
      <div class="hcard-body">
        <div class="hcard-icon">🎮</div>
        <div class="hcard-text">
          <div class="hcard-name">Hry</div>
          <div class="hcard-desc">Puzzle · Pexeso · Omalovánky · Zoom · Silueta · Barvy</div>
        </div>
        <div class="hcard-arrow">›</div>
      </div>
    </div>
  </div>
  <div class="home-footer">by JiHl · Data: OMDb</div>
</div>

<!-- ══ VÝBĚR OBTÍŽNOSTI ══ -->

<div id="vybrat-obtiz" class="screen">
  <div style="padding:0 22px;flex:1">
    <div class="page-header">
      <button class="back-btn" onclick="showScreen('home')">←</button>
      <div class="page-title">🎬 Kvíz</div>
    </div>
    <div class="page-sub">Vyber obtížnost</div>
    <div id="diff-list"></div>
  </div>
</div>

<!-- ══ KVÍZ TEXTOVÝ ══ -->

<div id="kviz-text" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="potvrzeniZpet()">←</button>
    <div class="progress-bar"><div id="kt-prog" class="progress-fill"></div></div>
    <div class="score-wrap">
      <span style="color:#FFD60A;font-size:13px">★</span>
      <span id="kt-skore" style="font-size:15px;font-weight:700">0</span>
      <span id="kt-serie" style="font-size:11px;color:#FF9F0A;margin-left:3px"></span>
    </div>
  </div>
  <div class="kviz-body" id="kt-body"></div>
</div>

<!-- ══ KVÍZ OBRÁZKOVÝ ══ -->

<div id="kviz-obr" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="potvrzeniZpet()">←</button>
    <div class="progress-bar"><div id="ko-prog" class="progress-fill"></div></div>
    <div id="ko-skore" style="font-size:15px;font-weight:700">0⭐</div>
  </div>
  <div id="ko-otazka" class="obr-question"></div>
  <div class="obr-grid" id="ko-grid"></div>
</div>

<!-- ══ VÝBĚR HER ══ -->

<div id="vybrat-hry" class="screen">
  <div style="padding:0 22px;flex:1">
    <div class="page-header">
      <button class="back-btn" onclick="showScreen('home')">←</button>
      <div class="page-title">🎮 Hry</div>
    </div>
    <div class="page-sub" style="margin-bottom:20px">Vyber si hru</div>
    <div class="hry-grid" id="hry-grid"></div>
  </div>
</div>

<!-- ══ HRA INFO ══ -->

<div id="hra-info" class="screen">
  <div id="info-emoji" class="info-emoji"></div>
  <div id="info-title" class="info-title"></div>
  <div id="info-desc" class="info-desc"></div>
  <div id="info-rules" class="info-rules"></div>
  <button id="info-start" class="btn-primary" onclick="spustitHru()">▶ Hrát!</button>
  <button class="btn-ghost" onclick="showScreen('vybrat-hry')">← Zpět na výběr</button>
</div>

<!-- ══ MINIHRA ══ -->

<div id="minihra" class="screen">
  <div class="mini-topbar">
    <div class="mini-topbar-l">
      <div class="mini-topbar-label">HRA</div>
      <div id="mini-name" class="mini-topbar-name"></div>
    </div>
    <button class="mini-exit" onclick="showScreen('vybrat-hry')">✕ Konec</button>
  </div>
  <div class="mini-body" id="mini-body"></div>
</div>

<!-- ══ VÝSLEDKY ══ -->

function mix(arr){return[...arr].sort(()=>Math.random()-.5);}
function getHS(k){try{return parseInt(localStorage.getItem("hs2_"+k)||"0");}catch{return 0;}}
function setHS(k,n){try{localStorage.setItem("hs2_"+k,n);}catch{}}

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

async function getPoster(imdb){
  if(CACHE[imdb]) return CACHE[imdb];
  try{
    const r=await fetch(`https://www.omdbapi.com/?i=${imdb}&apikey=${OMDB}`);
    const d=await r.json();
    if(d.Poster&&d.Poster!=="N/A"){CACHE[imdb]=d.Poster;return d.Poster;}
  }catch{}
  return null;
}

function renderDiffList(){
  document.getElementById("diff-list").innerHTML = KATEGORIE.map((k,i)=>{
    const hs=getHS(k.id);
    return `<div class="diff-btn" style="background:${k.bg};border-color:${k.border};animation-delay:${.1+i*.1}s" onclick="spustitKviz('${k.id}')">
      <div class="diff-icon" style="background:${k.barva}20">${k.emoji}</div>
      <div class="diff-info">
        <div class="diff-name">${k.label}</div>
        <div class="diff-sub">${k.sub}</div>
      </div>
      ${hs>0?`<div class="diff-hs"><div class="diff-hs-l">REKORD</div><div class="diff-hs-v" style="color:${k.barva}">${hs}/10</div></div>`:""}
      <div style="color:${k.barva};font-size:20px;opacity:.6">›</div>
    </div>`;
  }).join("");
}

function renderHryGrid(){
  document.getElementById("hry-grid").innerHTML = HRY_DEF.map((h,i)=>{
    const hs=getHS("hra_"+h.id);
    return `<div class="hra-card" style="animation-delay:${i*.07}s;--c:${h.barva}" onclick="otevritHraInfo('${h.id}')"
      onmouseenter="this.style.borderColor='${h.barva}50';this.style.boxShadow='0 8px 24px ${h.barva}20'"
      onmouseleave="this.style.borderColor='';this.style.boxShadow=''">
      <div class="hra-card-emoji">${h.emoji}</div>
      <div class="hra-card-name">${h.name}</div>
      <div class="hra-card-desc">${h.desc}</div>
      ${hs>0?`<div class="hra-card-hs" style="color:${h.barva}">Rekord: ${hs}</div>`:""}
    </div>`;
  }).join("");
}

// KVÍZ
// ══════════════════════════════════════
function spustitKviz(katId){
  aktKat=KATEGORIE.find(k=>k.id===katId);
  const filmy=FILMY[katId];
  const vybrane=mix(filmy).slice(0,10);
  otazky=vybrane.map((f,i)=>{
    const spatne=mix(filmy.filter(x=>x.id!==f.id)).slice(0,3);
    const moz=mix([f,...spatne]);
    const jeHint=i%2===1&&katId!=="lehka";
    return{film:f,moz,spravne:f.id,jeHint};
  });
  otIdx=0;skore=0;serie=0;nejSerie=0;napouzita=false;
  if(aktKat.mod==="obrazky") startObrKviz();
  else startTextKviz();
}

  const src=await getPoster(q.film.imdb);

function vybrTextQ(mozId){
  const q=otazky[otIdx];
  const btn=document.getElementById("o_"+q.spravne);
  if(!btn||btn.disabled) return;
  const ok=mozId===q.spravne;
  const body=ok?(napouzita?0:1):0;
  skore+=body;
  document.getElementById("kt-skore").textContent=skore;
  if(ok){serie++;if(serie>nejSerie)nejSerie=serie;}else serie=0;
  document.getElementById("kt-serie").textContent=serie>=2?"🔥"+serie:"";
  q.moz.forEach(m=>{
    const b=document.getElementById("o_"+m.id);
    if(!b)return;b.disabled=true;
    if(m.id===q.spravne)b.classList.add("ok");
    else if(m.id===mozId)b.classList.add("err");
    else b.classList.add("dim");
  });
  setTimeout(()=>{
    if(otIdx+1>=otazky.length) zobrazVysledky();
    else{otIdx++;napouzita=false;renderTextQ();}
  },1700);
}

// — OBRÁZKOVÝ —
function startObrKviz(){
  showScreen("kviz-obr");
  renderObrQ();
}

async function renderObrQ(){
  const q=otazky[otIdx];
  const pct=(otIdx/otazky.length)*100;
  const prog=document.getElementById("ko-prog");
  prog.style.width=pct+"%";prog.style.background=aktKat.barva;
  document.getElementById("ko-skore").textContent=skore+"⭐";

  // Otázka – jasný text co mají dělat
  document.getElementById("ko-otazka").innerHTML=`
    <div class="obr-q-title">🤔 Který plakát patří k tomuto číslu?</div>
    <div class="obr-q-sub">Otázka ${otIdx+1} z ${otazky.length} · Klepni na správný plakát</div>`;

  const grid=document.getElementById("ko-grid");
  grid.innerHTML=q.moz.map(m=>`
    <div class="obr-tile" id="t_${m.id}" onclick="vybrObrQ('${m.id}')">
      <div style="font-size:24px;animation:pulse 1s infinite">⏳</div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px">${m.title}</div>
    </div>`).join("");

  for(const m of q.moz){
    const src=await getPoster(m.imdb);
    const tile=document.getElementById("t_"+m.id);
    if(tile&&src) tile.innerHTML=`<img src="${src}"><div style="position:absolute;bottom:0;left:0;right:0;padding:6px 4px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:10px;font-weight:600;text-align:center">${m.title}</div>`;
  }
}

function vybrObrQ(mozId){
  const q=otazky[otIdx];
  const tiles=document.querySelectorAll(".obr-tile");
  if([...tiles].some(t=>t.dataset.done)) return;
  tiles.forEach(t=>t.dataset.done="1");
  const ok=mozId===q.spravne;
  if(ok) skore++;
  document.getElementById("ko-skore").textContent=skore+"⭐";
  q.moz.forEach(m=>{
    const tile=document.getElementById("t_"+m.id);
    if(!tile)return;
    if(m.id===q.spravne){tile.classList.add("ok");tile.innerHTML+=`<div class="obr-overlay ok">✓</div>`;}
    else if(m.id===mozId){tile.classList.add("err");tile.innerHTML+=`<div class="obr-overlay err">✗</div>`;}
  });
  setTimeout(()=>{
    if(otIdx+1>=otazky.length) zobrazVysledky();
    else{otIdx++;renderObrQ();}
  },1500);
}

function zobrazVysledky(){
  const pct=skore/otazky.length;
  const prev=getHS(aktKat.id);
  const jeNovy=skore>prev;
  if(jeNovy)setHS(aktKat.id,skore);
  const{emoji,titul,sub}=pct>=.9?{emoji:"🏆",titul:"Filmový expert!",sub:"Fantastický výsledek!"}
    :pct>=.7?{emoji:"🎉",titul:"Skvělý výsledek!",sub:"Filmy ti nejsou cizí"}
    :pct>=.5?{emoji:"👍",titul:"Dobrý pokus!",sub:"Ještě trochu procvičit"}
    :{emoji:"🎬",titul:"Trénuj dál!",sub:"Filmy jsou krásné!"};
  document.getElementById("v-emoji").textContent=emoji;
  document.getElementById("v-title").textContent=titul;
  document.getElementById("v-sub").textContent=sub;
  document.getElementById("v-new").style.display=jeNovy?"block":"none";
  document.getElementById("v-spravne").textContent=skore+"/"+otazky.length;
  document.getElementById("v-spravne").style.color=aktKat.barva;
  document.getElementById("v-pct").textContent=Math.round(pct*100)+"%";
  document.getElementById("v-serie").textContent=nejSerie;
  document.getElementById("v-rekord").textContent=Math.max(skore,prev)+"/10";
  document.getElementById("v-rekord").style.color=aktKat.barva;
  document.getElementById("v-znovu").style.background=aktKat.barva;
  showScreen("vysledky");
}

function startZoom(){
  if(zoomTimer)clearInterval(zoomTimer);
  zoomFilm=mix(aktHraFilmy)[0];
  zoomMoz=mix([zoomFilm,...mix(aktHraFilmy.filter(f=>f.id!==zoomFilm.id)).slice(0,3)]);
  zoomKrok=0;
  renderZoom();
  zoomTimer=setInterval(()=>{
    if(zoomKrok>=4){clearInterval(zoomTimer);return;}
    zoomKrok++;renderZoom();
  },2200);
}

async function renderZoom(vybrano=null){
  const src=await getPoster(zoomFilm.imdb);
  const blur=vybrano?0:[22,14,7,2,0][Math.min(zoomKrok,4)];
  const body=vybrano===zoomFilm.id?Math.max(0,4-zoomKrok):0;
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-lbl">🔍 Zoom In</div>
    <div class="mini-hint">Uhádni film co nejdříve</div>
    <div class="mini-poster" style="position:relative">
      ${src?`<img src="${src}" style="filter:blur(${blur}px);transition:filter 1.2s;transform:scale(1.12)">`:`<span style="font-size:30px;animation:pulse 1s infinite">⏳</span>`}
      ${!vybrano?`<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px">
        ${[0,1,2,3,4].map(i=>`<div style="width:6px;height:6px;border-radius:50%;background:${i<=zoomKrok?"#fff":"rgba(255,255,255,.2)"}"></div>`).join("")}
      </div>`:""}
    </div>
    ${!vybrano
      ?zoomMoz.map(m=>`<button class="mini-opt" onclick="vybrZoom('${m.id}')">${m.title}</button>`).join("")
      :`<div class="mini-result">
          <div class="res-emoji">${vybrano===zoomFilm.id?"🎯":"😅"}</div>
          <div class="res-title">${vybrano===zoomFilm.id?"+"+body+" bodů!":"Špatně"}</div>
          ${vybrano!==zoomFilm.id?`<div class="res-sub">Správně: ${zoomFilm.title}</div>`:""}
          <button class="res-next" onclick="startZoom()">Další film ›</button>
        </div>`}`;
}

function vybrZoom(mozId){
  clearInterval(zoomTimer);
  renderZoom(mozId);
  const body=mozId===zoomFilm.id?Math.max(0,4-zoomKrok):0;
  if(body>0){const hs=getHS("hra_zoom");if(body>hs)setHS("hra_zoom",body);}
}

function startPuzzle(){
  puzzleFilm=mix(aktHraFilmy)[0];
  puzzleDilky=mix([0,1,2,3,4,5,6,7,8]);
  puzzleSel=null;puzzleTahy=0;
  getPoster(puzzleFilm.imdb).then(s=>{puzzleSrc=s;renderPuzzle();});

function renderPuzzle(){
  const vyreseno=puzzleDilky.every((v,i)=>v===i);
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-lbl">🧩 Puzzle – ${puzzleFilm.title}</div>
    <div class="puzzle-moves">${puzzleTahy} tahů ${vyreseno?"· ✓ Složeno!":""}</div>
    ${!vyreseno?`<div class="puzzle-grid">
      ${puzzleDilky.map((d,p)=>{
        const col=d%3,row=Math.floor(d/3);
        const style=puzzleSrc
          ?`background-image:url(${puzzleSrc});background-size:300% 300%;background-position:${col*50}% ${row*50}%`
          :`background:#2a2a3e`;
        return `<div class="puzzle-d ${puzzleSel===p?"sel":""}" style="${style}" onclick="klikPuzzle(${p})"></div>`;
      }).join("")}
    </div>
    <button class="mini-opt" style="text-align:center;color:rgba(255,255,255,.4)" onclick="startPuzzle()">🔀 Nový film</button>`
    :`<div class="mini-result">
        <div class="res-emoji">🏆</div>
        <div class="res-title">Složeno za ${puzzleTahy} tahů!</div>
        <div class="res-sub">${puzzleTahy<=15?"Skvěle! Skoro dokonalé":puzzleTahy<=25?"Dobře!":"Příště méně tahů 😄"}</div>
        <button class="res-next" onclick="startPuzzle()">Nový film ›</button>
      </div>`}`;
}

function klikPuzzle(pos){
  if(puzzleSel===null){puzzleSel=pos;}
  else{
    const n=[...puzzleDilky];
    [n[puzzleSel],n[pos]]=[n[pos],n[puzzleSel]];
    puzzleDilky=n;puzzleTahy++;puzzleSel=null;
  }
  renderPuzzle();
}

// ══════════════════════════════════════
function startPexeso(){
  const vybrane=mix(aktHraFilmy).slice(0,6);
  const dvojice=mix([...vybrane,...vybrane].map((f,i)=>({...f,uid:f.id+"_"+Math.floor(i/2<6?"A":"B")})));
  pexKarty=dvojice.map((f,i)=>({...f,pos:i,odkryta:false,sparovana:false}));
  pexOdkryte=[];pexSparovane=[];pexPokusy=0;pexCeka=false;
  renderPexeso();
}

async function renderPexeso(){
  const hotovo=pexSparovane.length===pexKarty.length/2;
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-lbl">🃏 Pexeso</div>
    <div style="display:flex;gap:20px;justify-content:center;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:4px">
      <span>Pokusy: <b style="color:#fff">${pexPokusy}</b></span>
      <span>Nalezeno: <b style="color:#34C759">${pexSparovane.length}/${pexKarty.length/2}</b></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%">
      ${pexKarty.map(k=>`
        <div class="pex-karta ${k.sparovana?"sparovana":k.odkryta?"odkryta":""}"
          id="pex_${k.pos}" onclick="klikPex(${k.pos})">
          ${k.odkryta||k.sparovana?`<img src="${CACHE[k.imdb]||""}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover">`:"🎬"}
        </div>`).join("")}
    </div>
    ${hotovo?`<div class="mini-result">
      <div class="res-emoji">🎊</div>
      <div class="res-title">Hotovo za ${pexPokusy} pokusů!</div>
      <button class="res-next" onclick="startPexeso()">Hrát znovu ›</button>
    </div>`:""}`;
  // Přednahrát postery
  pexKarty.forEach(k=>{if(!CACHE[k.imdb])getPoster(k.imdb);});
}

async function klikPex(pos){
  if(pexCeka) return;
  const k=pexKarty[pos];
  if(k.odkryta||k.sparovana) return;
  k.odkryta=true;
  // Načíst poster
  if(!CACHE[k.imdb]) await getPoster(k.imdb);
  const tile=document.getElementById("pex_"+pos);
  if(tile){
    tile.classList.add("odkryta");
    tile.innerHTML=CACHE[k.imdb]?`<img src="${CACHE[k.imdb]}" style="width:100%;height:100%;object-fit:cover">`:"🎬";
  }
  pexOdkryte.push(pos);
  if(pexOdkryte.length===2){
    pexPokusy++;
    pexCeka=true;
    const[a,b]=pexOdkryte;
    const ka=pexKarty[a],kb=pexKarty[b];
    if(ka.id===kb.id){
      // Spárováno
      setTimeout(()=>{
        ka.sparovana=kb.sparovana=true;
        pexSparovane.push(ka.id);
        pexOdkryte=[];pexCeka=false;
        renderPexeso();
      },600);
    }else{
      setTimeout(()=>{
        ka.odkryta=kb.odkryta=false;
        pexOdkryte=[];pexCeka=false;
        renderPexeso();
      },1000);
    }
  }
}

const OMAL_BARVY=["#FF4444","#FF8C00","#FFD700","#44BB44","#4488FF","#9944FF","#FF44AA","#FFFFFF","#888888","#000000"];

async function startOmalov(){
  const film=mix(aktHraFilmy)[0];
  const src=await getPoster(film.imdb);
  omalBarva=OMAL_BARVY[0];
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-lbl">🖍️ Omalovánky – ${film.title}</div>
    <div class="mini-hint">Vyber barvu a klepni na plakát</div>
    <div class="omal-barvy" id="omal-barvy">
      ${OMAL_BARVY.map((b,i)=>`<div class="omal-barva ${i===0?"on":""}" style="background:${b}" onclick="vybrOmalBarvu('${b}',this)"></div>`).join("")}
    </div>
    <div style="width:100%;border-radius:16px;overflow:hidden;position:relative">
      <canvas id="omal-canvas" width="600" height="400" style="width:100%;display:block;border-radius:16px;cursor:crosshair"></canvas>
    </div>
    <div style="display:flex;gap:10px;width:100%">
      <button class="mini-opt" style="text-align:center;flex:1" onclick="omalVycistit()">🗑️ Vymazat</button>
      <button class="mini-opt" style="text-align:center;flex:1;background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#FFD60A" onclick="startOmalov()">🎬 Nový film</button>
    </div>`;

  omalCanvas=document.getElementById("omal-canvas");
  omalCtx=omalCanvas.getContext("2d");
  if(src){
    const img=new Image();
    img.crossOrigin="anonymous";
    img.onload=()=>{
      omalCtx.drawImage(img,0,0,600,400);
      // Přidat filtr pro omalovánkový efekt
      omalCtx.globalAlpha=0.4;
      omalCtx.fillStyle="#fff";
      omalCtx.fillRect(0,0,600,400);
      omalCtx.globalAlpha=1;
    };
    img.src=src;
  }else{
    omalCtx.fillStyle="#1a1a2e";
    omalCtx.fillRect(0,0,600,400);
    omalCtx.fillStyle="rgba(255,255,255,.3)";
    omalCtx.font="bold 24px system-ui";
    omalCtx.textAlign="center";
    omalCtx.fillText("🎬 "+film.title,300,200);
  }

  let kreslim=false;
  const getPos=(e)=>{
    const rect=omalCanvas.getBoundingClientRect();
    const scaleX=600/rect.width,scaleY=400/rect.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*scaleX,y:(src.clientY-rect.top)*scaleY};
  };
  const start=(e)=>{e.preventDefault();kreslim=true;const p=getPos(e);omalCtx.beginPath();omalCtx.moveTo(p.x,p.y);};
  const move=(e)=>{e.preventDefault();if(!kreslim)return;const p=getPos(e);omalCtx.lineTo(p.x,p.y);omalCtx.strokeStyle=omalBarva;omalCtx.lineWidth=18;omalCtx.lineCap="round";omalCtx.lineJoin="round";omalCtx.stroke();};
  const stop=(e)=>{e.preventDefault();kreslim=false;};
  omalCanvas.addEventListener("mousedown",start);
  omalCanvas.addEventListener("mousemove",move);
  omalCanvas.addEventListener("mouseup",stop);
  omalCanvas.addEventListener("touchstart",start,{passive:false});
  omalCanvas.addEventListener("touchmove",move,{passive:false});
  omalCanvas.addEventListener("touchend",stop,{passive:false});
}

function vybrOmalBarvu(barva,el){
  omalBarva=barva;
  document.querySelectorAll(".omal-barva").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
}

function omalVycistit(){
  if(omalCtx) omalCtx.clearRect(0,0,600,400);
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
renderDiffList();
renderHryGrid();
</script>
