<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Filmová Hra</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#0a0a14;font-family:system-ui,-apple-system,sans-serif;color:#fff;min-height:100vh;}
  .screen{display:none;min-height:100vh;padding:0 22px;}
  .screen.active{display:flex;flex-direction:column;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes zoomIn{from{transform:scale(0.3);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes slideRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ÚVOD */
#uvod{background:linear-gradient(160deg,#0a0a14 0%,#12101e 50%,#0e0e1a 100%);}
.uvod-logo{font-size:66px;text-align:center;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,184,48,0.4));margin-bottom:14px;}
.uvod-sub{font-size:13px;letter-spacing:6px;color:rgba(255,255,255,0.3);text-align:center;font-weight:600;margin-bottom:8px;}
.uvod-title{font-size:34px;font-weight:900;text-align:center;letter-spacing:2px;line-height:1;}
.uvod-sub2{font-size:13px;color:rgba(255,255,255,0.3);text-align:center;margin-top:10px;margin-bottom:44px;}
.kat-btn{display:flex;align-items:center;gap:18px;padding:20px 22px;border-radius:22px;border:1.5px solid;cursor:pointer;text-align:left;margin-bottom:14px;transition:transform 0.2s,box-shadow 0.2s;animation:slideUp 0.5s ease both;}
.kat-btn:active{transform:scale(0.97);}
.kat-icon{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.kat-label{font-size:20px;font-weight:800;margin-bottom:3px;}
.kat-sub{font-size:12px;color:rgba(255,255,255,0.38);}
.kat-hs{text-align:center;margin-right:6px;}
.kat-hs-label{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;}
.kat-hs-val{font-size:18px;font-weight:800;}
.kat-arrow{font-size:20px;opacity:0.7;}
.uvod-footer{margin-top:auto;padding:30px 0 28px;text-align:center;font-size:10px;color:rgba(255,255,255,0.15);letter-spacing:2px;}

/* TOPBAR */
.topbar{display:flex;align-items:center;padding:50px 22px 14px;gap:12px;}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}
.score-display{display:flex;align-items:center;gap:6px;}

/* KVÍZ TEXTOVÝ */
#kviz-text{background:linear-gradient(160deg,#0a0a14 0%,#12101e 100%);}
.poster-wrap{position:relative;margin-bottom:16px;border-radius:16px;overflow:hidden;height:180px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;}
.poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.poster-loading{font-size:28px;animation:pulse 1s infinite;}
.trailer-btn{position:absolute;bottom:10px;right:10px;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:12px;font-weight:600;cursor:pointer;backdrop-filter:blur(8px);}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:12px;}
.otazka-text{font-size:15px;color:rgba(255,255,255,0.88);line-height:1.6;margin-bottom:10px;}
.meta{display:flex;gap:8px;margin-bottom:20px;align-items:center;}
.meta-omdb{font-size:10px;font-weight:700;color:#FF9F0A;padding:2px 8px;border-radius:6px;background:rgba(255,159,10,0.15);}
.meta-rok{font-size:11px;color:rgba(255,255,255,0.3);}
.moznost{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:16px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);cursor:pointer;transition:all 0.25s;width:100%;text-align:left;margin-bottom:10px;}
.moznost:active{transform:scale(0.98);}
.moznost.spravne{background:rgba(52,199,89,0.18);border-color:rgba(52,199,89,0.7);}
.moznost.spatne{background:rgba(255,59,48,0.18);border-color:rgba(255,59,48,0.7);}
.moznost.fade{opacity:0.35;}
.pismeno{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.moznost-text{font-size:14px;font-weight:500;flex:1;}

/* KVÍZ OBRÁZKOVÝ */
#kviz-obr{background:linear-gradient(160deg,#0a0a14 0%,#12101e 100%);}
.emoji-skore{text-align:center;padding-bottom:16px;font-size:22px;}
.obr-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 24px;}
.obr-tile{border-radius:16px;overflow:hidden;cursor:pointer;border:2px solid rgba(255,255,255,0.08);transition:all 0.3s;aspect-ratio:2/3;background:#222;position:relative;display:flex;align-items:center;justify-content:center;}
.obr-tile img{width:100%;height:100%;object-fit:cover;display:block;}
.obr-tile.spravne{border:3px solid #34C759;}
.obr-tile.spatne{border:3px solid #FF3B30;}
.obr-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;}
.obr-overlay.spravne{background:rgba(52,199,89,0.25);}
.obr-overlay.spatne{background:rgba(255,59,48,0.25);}

/* MINIHRA WRAPPER */
#minihra{background:linear-gradient(160deg,#0a0a14 0%,#15102a 100%);}
.mini-header{padding:50px 22px 24px;display:flex;align-items:center;justify-content:space-between;}
.mini-label{font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.3);font-weight:600;}
.mini-nazev{font-size:20px;font-weight:700;color:#FFD60A;}
.mini-skip{font-size:11px;color:rgba(255,255,255,0.3);background:none;border:none;cursor:pointer;}
.mini-body{flex:1;padding:0 22px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.mini-title{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;}
.mini-sub{font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-top:4px;}
.mini-poster{width:200px;height:280px;border-radius:16px;overflow:hidden;background:#222;display:flex;align-items:center;justify-content:center;}
.mini-poster img{width:100%;height:100%;object-fit:cover;}
.mini-moznost{padding:12px 16px;border-radius:14px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;width:100%;text-align:left;margin-bottom:10px;}
.mini-moznost:active{transform:scale(0.97);}
.mini-result{text-align:center;animation:zoomIn 0.4s ease;}
.mini-result-emoji{font-size:40px;margin-bottom:8px;}
.mini-result-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.mini-result-sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:16px;}
.mini-pokracovat{padding:12px 32px;border-radius:14px;background:#FFD60A;border:none;font-size:15px;font-weight:700;color:#000;cursor:pointer;}

/* ZOOM */
.zoom-dots{display:flex;gap:6px;justify-content:center;margin-top:8px;}
.zoom-dot{width:6px;height:6px;border-radius:50%;}

/* SILUETA */
.silueta-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,0.4);gap:6px;}

/* BARVY */
.barvy-paleta{display:flex;gap:8px;padding:20px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);}
.barva-dilek{width:52px;height:72px;border-radius:10px;}
.mini-moznost-barvy{display:flex;align-items:center;gap:12px;}
.mini-barvy-nahled{display:flex;gap:4px;}
.mini-barva-mini{width:16px;height:16px;border-radius:4px;}

/* PUZZLE */
.puzzle-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;background:#111;border-radius:12px;overflow:hidden;width:270px;height:360px;}
.puzzle-dilek{overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border 0.15s;border-radius:4px;}
.puzzle-dilek.vybran{border:2px solid #FFD60A;}
.puzzle-pokusy{font-size:11px;color:rgba(255,255,255,0.3);text-align:center;}

/* VÝSLEDKY */
#vysledky{background:linear-gradient(160deg,#0a0a14 0%,#12101e 100%);align-items:center;justify-content:center;}
.vysl-emoji{font-size:76px;text-align:center;margin-bottom:14px;animation:zoomIn 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.vysl-title{font-size:26px;font-weight:900;text-align:center;margin-bottom:6px;}
.vysl-sub{font-size:14px;color:rgba(255,255,255,0.4);text-align:center;}
.vysl-novy{margin-top:10px;font-size:13px;color:#FFD60A;font-weight:700;text-align:center;animation:pulse 1s infinite;}
.stats-box{display:flex;width:100%;border-radius:22px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);overflow:hidden;margin:32px 0 12px;}
.stat{flex:1;padding:18px 8px;text-align:center;border-right:1px solid rgba(255,255,255,0.07);}
.stat:last-child{border-right:none;}
.stat-val{font-size:21px;font-weight:900;margin-bottom:3px;}
.stat-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;}
.rekord-box{width:100%;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);padding:14px 20px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;}
.rekord-label{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:2px;}
.rekord-val{font-size:16px;font-weight:700;}
.vysl-btn-primary{padding:16px;border-radius:18px;border:none;font-size:16px;font-weight:700;color:#000;cursor:pointer;width:100%;margin-bottom:12px;}
.vysl-btn-secondary{padding:15px;border-radius:18px;background:rgba(255,255,255,0.07);border:none;font-size:15px;font-weight:500;color:rgba(255,255,255,0.5);cursor:pointer;width:100%;}

/* TRAILER MODAL */
#trailer-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#trailer-modal.active{display:flex;}
.trailer-inner{width:100%;max-width:560px;border-radius:20px;overflow:hidden;background:#000;}
.trailer-iframe-wrap{position:relative;padding-bottom:56.25%;}
.trailer-iframe-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.trailer-close{width:100%;padding:14px;background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.5);font-size:14px;cursor:pointer;}

.kviz-obsah{flex:1;padding:0 22px 28px;overflow-y:auto;animation:slideRight 0.35s ease;}
.pb-32{padding-bottom:32px;}
</style>

</head>

  {id:"deti",label:"Děti",sub:"do 10 let · Obrázkový kvíz",emoji:"🧒",barva:"#FFB830",bg:"rgba(255,184,48,0.12)",border:"rgba(255,184,48,0.35)",mod:"obrazky"},

  {id:"zoom",nazev:"🔍 Zoom In"},
  {id:"silueta",nazev:"🎭 Silueta"},
  {id:"barvy",nazev:"🎨 Barvy"},

// ═══ STATE ═══
let aktKat = null, otazky = [], otIndex = 0, skore = 0, serie = 0, nejSerie = 0;
let napouzita = false, miniHraIndex = 0, miniSkore = 0;
let puzzleDilky = [], puzzleVybran = null, puzzlePokusy = 0;
let zoomKrok = 0, zoomTimer = null, zoomVybrano = null;
let silVybrano = null, barvyVybrano = null;

// ═══ HELPERS ═══
function zamichej(arr){return[...arr].sort(()=>Math.random()-0.5);}
function getHS(k){try{return parseInt(localStorage.getItem("hs_"+k)||"0");}catch{return 0;}}
function setHS(k,n){try{localStorage.setItem("hs_"+k,n);}catch{}}

async function nacistPoster(imdb){
  if(posterCache[imdb]) return posterCache[imdb];
  try{
    const r = await fetch(`https://www.omdbapi.com/?i=${imdb}&apikey=${OMDB_KEY}`);
    const d = await r.json();
    if(d.Poster && d.Poster!=="N/A"){posterCache[imdb]=d.Poster; return d.Poster;}
  }catch{}
  return null;
}

function zobrazObrazovku(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function buildOtazky(katId,count=10){
  const filmy = FILMY[katId];
  const vybrane = zamichej(filmy).slice(0,count);
  return vybrane.map((film,i)=>{
    const spatne = zamichej(filmy.filter(f=>f.id!==film.id)).slice(0,3);
    const moznosti = zamichej([film,...spatne]);
    const jeHint = i%2===1 && katId!=="deti";
    return {film,moznosti,spravne:film.id,jeHint};
  });
}

// ═══ ÚVOD ═══
function renderUvod(){
  const list = document.getElementById("kat-list");
  list.innerHTML = KATEGORIE.map((k,i)=>{
    const hs = getHS(k.id);
    return `<div class="kat-btn" style="background:${k.bg};border-color:${k.border};animation-delay:${0.15+i*0.12}s" onclick="spustit('${k.id}')">
      <div class="kat-icon" style="background:${k.barva}20;border:1px solid ${k.barva}30">${k.emoji}</div>
      <div style="flex:1"><div class="kat-label">${k.label}</div><div class="kat-sub">${k.sub}</div></div>
      ${hs>0?`<div class="kat-hs"><div class="kat-hs-label">REKORD</div><div class="kat-hs-val" style="color:${k.barva}">${hs}/10</div></div>`:""}
      <div class="kat-arrow" style="color:${k.barva}">›</div>
    </div>`;
  }).join("");
}

function spustit(katId){
  aktKat = KATEGORIE.find(k=>k.id===katId);
  otazky = buildOtazky(katId,10);
  otIndex = 0; skore = 0; serie = 0; nejSerie = 0; napouzita = false; miniSkore = 0;
  if(aktKat.mod==="obrazky") startObrazkuKviz();
  else startTextovyKviz();
}

function zpet(){
  if(confirm("Ukončit hru?")) zpetNaUvod();
}
function zpetNaUvod(){renderUvod();zobrazObrazovku("uvod");}
function znohu(){spustit(aktKat.id);}

// ═══ TEXTOVÝ KVÍZ ═══
function startTextovyKviz(){zobrazObrazovku("kviz-text");renderTextOtazku();}

async function renderTextOtazku(){
  const q = otazky[otIndex];
  const pct = (otIndex/otazky.length)*100;
  document.getElementById("kt-progress").style.width=pct+"%";
  document.getElementById("kt-progress").style.background=aktKat.barva;
  document.getElementById("kt-skore").textContent=skore;
  document.getElementById("kt-serie").textContent=serie>=2?"🔥"+serie:"";

  const pismena=["A","B","C","D"];
  const src = await nacistPoster(q.film.imdb);

  document.getElementById("kt-obsah").innerHTML=`
    <div class="poster-wrap">
      ${src?`<img src="${src}" alt="${q.film.title}">`:`<div class="poster-loading">⏳</div>`}
      <button class="trailer-btn" onclick="otevritTrailer('${q.film.trailer}',true)">▶ Trailer <span style="color:#FF9F0A;font-size:10px" id="nap-hint">${!napouzita?'−1':''}</span></button>
    </div>
    <div class="badge" style="background:${aktKat.barva}18;border:1px solid ${aktKat.barva}30;color:${aktKat.barva}">
      ${q.jeHint?"💡 Nápověda – uhádni film":"🎞️ Který film popisuje děj?"}
    </div>
    <div class="otazka-text">${q.jeHint?q.film.hint:q.film.plot}</div>
    <div class="meta">
      <span class="meta-omdb">OMDb</span>
      <span class="meta-rok">${q.film.year} · ${q.film.zanr||""}</span>
    </div>
    <div class="pb-32">
      ${q.moznosti.map((m,i)=>`
        <button class="moznost" id="moz-${m.id}" onclick="vybrattextovu('${m.id}')">
          <div class="pismeno" style="background:${aktKat.barva}20;color:${aktKat.barva}">${pismena[i]}</div>
          <span class="moznost-text">${m.title}</span>
        </button>
      `).join("")}
    </div>
  `;
}

function vybrattextovu(mozId){
  const q=otazky[otIndex];
  if(document.getElementById("moz-"+q.spravne).disabled) return;
  const spravne=mozId===q.spravne;
  const body=spravne?(napouzita?0:1):0;
  skore+=body; 
  document.getElementById("kt-skore").textContent=skore;
  if(spravne){serie++;if(serie>nejSerie)nejSerie=serie;}else serie=0;
  document.getElementById("kt-serie").textContent=serie>=2?"🔥"+serie:"";

  q.moznosti.forEach(m=>{
    const btn=document.getElementById("moz-"+m.id);
    if(!btn)return;
    btn.disabled=true;
    if(m.id===q.spravne) btn.classList.add("spravne");
    else if(m.id===mozId) btn.classList.add("spatne");
    else btn.classList.add("fade");
  });

  setTimeout(()=>{
    if(otIndex+1>=otazky.length) startMinihra();
    else{otIndex++;napouzita=false;renderTextOtazku();}
  },1700);
}

// ═══ OBRÁZKOVÝ KVÍZ ═══
function startObrazkuKviz(){zobrazObrazovku("kviz-obr");renderObrOtazku();}

async function renderObrOtazku(){
  const q=otazky[otIndex];
  const pct=(otIndex/otazky.length)*100;
  document.getElementById("ko-progress").style.width=pct+"%";
  document.getElementById("ko-progress").style.background=aktKat.barva;
  document.getElementById("ko-hvezdy").textContent="⭐".repeat(skore);

  const grid=document.getElementById("ko-grid");
  grid.innerHTML=q.moznosti.map(m=>`
    <div class="obr-tile" id="tile-${m.id}" onclick="vybratobr('${m.id}')">
      <div style="font-size:28px;animation:pulse 1s infinite">⏳</div>
    </div>
  `).join("");

  for(const m of q.moznosti){
    const src=await nacistPoster(m.imdb);
    const tile=document.getElementById("tile-"+m.id);
    if(tile&&src) tile.innerHTML=`<img src="${src}" alt="${m.title}">`;
  }
}

function vybratobr(mozId){
  const q=otazky[otIndex];
  if(!document.getElementById("tile-"+q.spravne)) return;
  if(document.getElementById("tile-"+q.spravne).dataset.done) return;
  document.querySelectorAll(".obr-tile").forEach(t=>t.dataset.done="1");

  const spravne=mozId===q.spravne;
  if(spravne) skore++;

  q.moznosti.forEach(m=>{
    const tile=document.getElementById("tile-"+m.id);
    if(!tile)return;
    if(m.id===q.spravne){
      tile.classList.add("spravne");
      tile.innerHTML+=`<div class="obr-overlay spravne">✓</div>`;
    }else if(m.id===mozId){
      tile.classList.add("spatne");
      tile.innerHTML+=`<div class="obr-overlay spatne">✗</div>`;
    }
  });

  setTimeout(()=>{
    if(otIndex+1>=otazky.length) startMinihra();
    else{otIndex++;renderObrOtazku();}
  },1400);
}

// ═══ MINIHRA ═══
function startMinihra(){
  const def=MINIHRY_DEF[miniHraIndex%4];
  document.getElementById("mini-nazev").textContent=def.nazev;
  const filmy=FILMY[aktKat.id];
  const film=zamichej(filmy)[0];
  const moznosti=zamichej([film,...zamichej(filmy.filter(f=>f.id!==film.id)).slice(0,3)]);
  
  if(def.id==="zoom") renderZoom(film,moznosti);
  else if(def.id==="silueta") renderSilueta(film,moznosti);
  else if(def.id==="barvy") renderBarvy(film,moznosti);
  else renderPuzzle(film);

  zobrazObrazovku("minihra");
}

function miniHraPreskocit(){miniSkore=0;miniHraIndex++;zobrazVysledky();}
function miniHraKonec(body){miniSkore=body;miniHraIndex++;zobrazVysledky();}

// ZOOM
async function renderZoom(film,moznosti){
  zoomKrok=0; zoomVybrano=null;
  if(zoomTimer) clearInterval(zoomTimer);
  const src=await nacistPoster(film.imdb);
  
  function vykreslit(){
    const blur=zoomVybrano?0:[20,12,6,2,0][Math.min(zoomKrok,4)];
    document.getElementById("mini-body").innerHTML=`
      <div class="mini-title">🔍 ZOOM IN</div>
      <div class="mini-sub">Plakát se postupně zostřuje · uhádni dříve = více bodů</div>
      <div class="mini-poster" style="position:relative">
        ${src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover;filter:blur(${blur}px);transition:filter 1.5s;transform:scale(1.1)">`:`<span style="font-size:30px">⏳</span>`}
        ${!zoomVybrano?`<div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px">
          ${[0,1,2,3,4].map(i=>`<div style="width:6px;height:6px;border-radius:50%;background:${i<=zoomKrok?'#fff':'rgba(255,255,255,0.2)'}"></div>`).join("")}
        </div>`:""}
      </div>
      ${!zoomVybrano
        ?moznosti.map(m=>`<button class="mini-moznost" onclick="zoomVybrat('${m.id}','${film.id}',${Math.max(0,4-zoomKrok)})">${m.title}</button>`).join("")
        :`<div class="mini-result">
          <div class="mini-result-emoji">${zoomVybrano===film.id?"🎯":"😅"}</div>
          <div class="mini-result-title">${zoomVybrano===film.id?`+${Math.max(0,4-zoomKrok)} bodů!`:"Špatně"}</div>
          ${zoomVybrano!==film.id?`<div class="mini-result-sub">Správně: ${film.title}</div>`:""}
          <button class="mini-pokracovat" onclick="miniHraKonec(${zoomVybrano===film.id?Math.max(0,4-zoomKrok):0})">Pokračovat ›</button>
        </div>`
      }
    `;
  }

  vykreslit();
  zoomTimer=setInterval(()=>{
    if(zoomVybrano||zoomKrok>=4){clearInterval(zoomTimer);return;}
    zoomKrok++; vykreslit();
  },2000);
}

function zoomVybrat(mozId,filmId,body){
  clearInterval(zoomTimer);
  zoomVybrano=mozId;
  const filmy=FILMY[aktKat.id];
  const film=filmy.find(f=>f.id===filmId);
  const moznosti=zamichej([film,...zamichej(filmy.filter(f=>f.id!==filmId)).slice(0,3)]);
  renderZoomResult(film,mozId,body);
}

async function renderZoomResult(film,vybrano,body){
  const src=await nacistPoster(film.imdb);
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-title">🔍 ZOOM IN</div>
    <div class="mini-poster">
      ${src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:30px">🎬</span>`}
    </div>
    <div class="mini-result">
      <div class="mini-result-emoji">${vybrano===film.id?"🎯":"😅"}</div>
      <div class="mini-result-title">${vybrano===film.id?`+${body} bodů!`:"Špatně"}</div>
      ${vybrano!==film.id?`<div class="mini-result-sub">Správně: ${film.title}</div>`:""}
      <button class="mini-pokracovat" onclick="miniHraKonec(${vybrano===film.id?body:0})">Pokračovat ›</button>
    </div>
  `;
}

// SILUETA
async function renderSilueta(film,moznosti){
  silVybrano=null;
  const src=await nacistPoster(film.imdb);
  
  function vykreslit(){
    document.getElementById("mini-body").innerHTML=`
      <div class="mini-title">🎭 SILUETA</div>
      <div class="mini-sub">Uhádni film podle siluety plakátu</div>
      <div class="mini-poster" style="position:relative;cursor:${!silVybrano?'pointer':'default'}" onclick="odhalitSiluetu()">
        ${src
          ?`<img src="${src}" style="width:100%;height:100%;object-fit:cover;filter:${silVybrano?'brightness(1)':'brightness(0)'};transition:filter 0.8s">`
          :`<span style="font-size:30px">🎬</span>`
        }
        ${!silVybrano?`<div class="silueta-hint"><span style="font-size:24px">👆</span>Odhal nápovědu</div>`:""}
      </div>
      ${!silVybrano
        ?moznosti.map(m=>`<button class="mini-moznost" onclick="siluetaVybrat('${m.id}','${film.id}')">${m.title}</button>`).join("")
        :`<div class="mini-result">
          <div class="mini-result-emoji">${silVybrano===film.id?"🎯":"😅"}</div>
          <div class="mini-result-title">${silVybrano===film.id?"+3 body!":"Špatně"}</div>
          ${silVybrano!==film.id?`<div class="mini-result-sub">Správně: ${film.title}</div>`:""}
          <button class="mini-pokracovat" onclick="miniHraKonec(${silVybrano===film.id?3:0})">Pokračovat ›</button>
        </div>`
      }
    `;
  }
  vykreslit();
  window._siluetaFilm=film; window._siluetaMoz=moznosti; window._siluetaSrc=src;
}

function odhalitSiluetu(){
  if(silVybrano) return;
  const film=window._siluetaFilm, moznosti=window._siluetaMoz;
  // jen odhalí obrázek, ale čeká na výběr
  const img=document.querySelector(".mini-poster img");
  if(img) img.style.filter="brightness(0.4)";
}

function siluetaVybrat(mozId,filmId){
  silVybrano=mozId;
  window._siluetaFilm=FILMY[aktKat.id].find(f=>f.id===filmId);
  renderSilueta(window._siluetaFilm,window._siluetaMoz);
}

// BARVY
function renderBarvy(film,moznosti){
  barvyVybrano=null;
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-title">🎨 BARVY PLAKÁTU</div>
    <div class="mini-sub">Který film má tyto barvy?</div>
    <div class="barvy-paleta">
      ${film.barvy.map(b=>`<div class="barva-dilek" style="background:${b};box-shadow:0 4px 16px ${b}60"></div>`).join("")}
    </div>
    ${moznosti.map(m=>`
      <button class="mini-moznost" onclick="barvyVybrat('${m.id}','${film.id}')">
        <div class="mini-moznost-barvy">
          <div class="mini-barvy-nahled">
            ${m.barvy.slice(0,3).map(b=>`<div class="mini-barva-mini" style="background:${b}"></div>`).join("")}
          </div>
          <span>${m.title}</span>
        </div>
      </button>
    `).join("")}
  `;
}

async function barvyVybrat(mozId,filmId){
  barvyVybrano=mozId;
  const film=FILMY[aktKat.id].find(f=>f.id===filmId);
  const src=await nacistPoster(film.imdb);
  const body=mozId===filmId?3:0;
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-title">🎨 BARVY PLAKÁTU</div>
    <div class="mini-poster">
      ${src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:30px">🎬</span>`}
    </div>
    <div class="mini-result">
      <div class="mini-result-emoji">${mozId===filmId?"🎨":"😅"}</div>
      <div class="mini-result-title">${mozId===filmId?"+3 body!":"Špatně"}</div>
      ${mozId!==filmId?`<div class="mini-result-sub">Správně: ${film.title}</div>`:""}
      <button class="mini-pokracovat" onclick="miniHraKonec(${body})">Pokračovat ›</button>
    </div>
  `;
}

// PUZZLE
async function renderPuzzle(film){
  puzzleDilky=zamichej([0,1,2,3,4,5,6,7,8]);
  puzzleVybran=null; puzzlePokusy=0;
  const src=await nacistPoster(film.imdb);
  window._puzzleFilm=film; window._puzzleSrc=src;
  renderPuzzleGrid();
}

function renderPuzzleGrid(){
  const film=window._puzzleFilm, src=window._puzzleSrc;
  const vyreseno=puzzleDilky.every((v,i)=>v===i);
  
  document.getElementById("mini-body").innerHTML=`
    <div class="mini-title">🧩 SKLÁDAČKA PLAKÁTU</div>
    <div class="mini-sub puzzle-pokusy">Klikni na dva dílky a prohoď je · ${puzzlePokusy} tahů</div>
    ${!vyreseno
      ?`<div class="puzzle-grid">
          ${puzzleDilky.map((dilek,pos)=>{
            const col=dilek%3, row=Math.floor(dilek/3);
            const style=src
              ?`background-image:url(${src});background-size:300% 300%;background-position:${col*50}% ${row*50}%`
              :`background:#333`;
            return `<div class="puzzle-dilek ${puzzleVybran===pos?'vybran':''}" style="${style}" onclick="puzzleKlik(${pos})"></div>`;
          }).join("")}
        </div>`
      :`<div class="mini-result">
          <div class="mini-result-emoji">🏆</div>
          <div class="mini-result-title">Složeno!</div>
          <div class="mini-result-sub">${puzzlePokusy} tahů</div>
        </div>`
    }
    <button ${vyreseno?"":`style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)"`} class="mini-pokracovat" onclick="miniHraKonec(${vyreseno?Math.max(0,20-puzzlePokusy):0})">
      ${vyreseno?"Pokračovat ›":"Přeskočit"}
    </button>
  `;
}

function puzzleKlik(pos){
  if(puzzleVybran===null){puzzleVybran=pos;}
  else{
    const nove=[...puzzleDilky];
    [nove[puzzleVybran],nove[pos]]=[nove[pos],nove[puzzleVybran]];
    puzzleDilky=nove; puzzlePokusy++; puzzleVybran=null;
  }
  renderPuzzleGrid();
}

// ═══ VÝSLEDKY ═══
function zobrazVysledky(){
  const pct=skore/otazky.length;
  const prev=getHS(aktKat.id);
  const jeNovy=skore>prev;
  if(jeNovy) setHS(aktKat.id,skore);

  const {emoji,titul,sub}=pct>=0.9?{emoji:"🏆",titul:"Filmový expert!",sub:"Encyklopedické znalosti filmů"}
    :pct>=0.7?{emoji:"🎉",titul:"Skvělý výsledek!",sub:"Filmy ti nejsou cizí"}
    :pct>=0.5?{emoji:"👍",titul:"Dobrý pokus!",sub:"Ještě trochu procvičit"}
    :{emoji:"🎬",titul:"Trénuj dál!",sub:"Filmy jsou krásné, nevzdávej to!"};

  document.getElementById("vysl-emoji").textContent=emoji;
  document.getElementById("vysl-title").textContent=titul;
  document.getElementById("vysl-sub").textContent=sub;
  document.getElementById("vysl-novy").style.display=jeNovy?"block":"none";
  document.getElementById("vs-spravne").textContent=skore+"/"+otazky.length;
  document.getElementById("vs-spravne").style.color=aktKat.barva;
  document.getElementById("vs-pct").textContent=Math.round(pct*100)+"%";
  document.getElementById("vs-serie").textContent=nejSerie;
  document.getElementById("vs-rekord").textContent=Math.max(skore,prev)+"/10";
  document.getElementById("vs-rekord").style.color=aktKat.barva;
  document.getElementById("vysl-btn-primary").style.background=aktKat.barva;
  if(miniSkore>0){
    document.getElementById("vs-mini").style.display="block";
    document.getElementById("vs-mini-val").textContent="+"+miniSkore+" bodů";
  }else document.getElementById("vs-mini").style.display="none";
  zobrazObrazovku("vysledky");
}

// ═══ TRAILER ═══
function otevritTrailer(videoId, jeNapoveda){
  if(jeNapoveda) napouzita=true;
  document.getElementById("trailer-iframe").src=`https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById("trailer-modal").classList.add("active");
}
function zavritTrailer(){
  document.getElementById("trailer-iframe").src="";
  document.getElementById("trailer-modal").classList.remove("active");
}
